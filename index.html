<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1115">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>Internship Tracker</title>
<style>
:root{
  --bg:#0f1115; --panel:#171a21; --panel2:#1e2230; --line:#2a2f3d;
  --text:#e8eaf0; --dim:#9aa3b5; --accent:#5b8cff; --green:#3ecf8e;
  --red:#ff6b6b; --amber:#ffb454; --purple:#b48cff;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0; background:var(--bg); color:var(--text);
  font:15px/1.45 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  overscroll-behavior-y:contain}
a{color:var(--accent); text-decoration:none}
button{font:inherit; border:0; border-radius:10px; cursor:pointer}
input,select,textarea{font:inherit; color:var(--text); background:var(--panel2);
  border:1px solid var(--line); border-radius:9px; padding:8px 10px; width:100%}
input[type=checkbox]{width:auto; transform:scale(1.2); accent-color:var(--accent)}
textarea{min-height:70px; resize:vertical}
label{font-size:12px; color:var(--dim); display:block; margin:10px 0 3px}
h1{font-size:17px; margin:0}
h3{margin:18px 0 8px; font-size:14px; color:var(--dim); text-transform:uppercase; letter-spacing:.06em}

header{position:sticky; top:0; z-index:30; background:rgba(15,17,21,.92);
  backdrop-filter:blur(8px); padding:12px 14px 8px; border-bottom:1px solid var(--line)}
.hrow{display:flex; align-items:center; gap:10px}
.hrow .grow{flex:1}
.dot{width:9px; height:9px; border-radius:50%; background:var(--dim); display:inline-block}
.dot.ok{background:var(--green)} .dot.err{background:var(--red)} .dot.busy{background:var(--amber)}
.iconbtn{background:var(--panel2); color:var(--text); padding:7px 11px; border-radius:10px; font-size:15px}

#stats{display:grid; grid-template-columns:repeat(4,1fr); gap:7px; padding:10px 12px}
.chip{background:var(--panel); border:1px solid var(--line); border-radius:12px;
  padding:8px 6px 7px; text-align:center; position:relative}
.chip b{font-size:19px; display:block}
.chip span{font-size:10.5px; color:var(--dim); display:block; line-height:1.15; margin-top:2px}
.chip .adj{position:absolute; top:2px; right:5px; font-size:10px; color:var(--dim); cursor:pointer; padding:2px}
.chip.tap{cursor:pointer}
.chip.tap b{color:var(--accent)}
#napanel{display:none; margin:0 12px 8px; background:var(--panel); border:1px solid var(--line);
  border-radius:12px; padding:10px 12px; font-size:13px}
#napanel .co{display:inline-block; background:var(--panel2); border-radius:8px; padding:3px 8px; margin:3px 4px 0 0}

nav{display:flex; gap:6px; padding:4px 12px 10px}
nav button{flex:1; background:var(--panel); color:var(--dim); padding:9px 0; border-radius:11px; font-weight:600}
nav button.on{background:var(--accent); color:#fff}

main{padding:4px 12px 90px; max-width:760px; margin:0 auto}
.card{background:var(--panel); border:1px solid var(--line); border-radius:14px;
  padding:12px 13px; margin-bottom:10px}
.card .ttl{font-weight:650}
.card .sub{color:var(--dim); font-size:12.5px; margin-top:2px}
.row{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
.pill{font-size:11px; padding:3px 9px; border-radius:99px; font-weight:600}
.pill.planning{background:#3a3320; color:var(--amber)}
.pill.awaiting{background:#20293a; color:var(--accent)}
.pill.in_progress{background:#20332a; color:var(--green)}
.pill.offer{background:#2d2140; color:var(--purple)}
.live{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
.btn{padding:8px 13px; border-radius:10px; font-weight:600; font-size:13.5px}
.btn.pri{background:var(--accent); color:#fff}
.btn.ok{background:#1d3a2d; color:var(--green)}
.btn.warn{background:#3a2626; color:var(--red)}
.btn.ghost{background:var(--panel2); color:var(--text)}
.btn.sm{padding:6px 10px; font-size:12.5px}
.actions{display:flex; gap:7px; margin-top:9px; flex-wrap:wrap}
.cogroup{margin:14px 0 6px; font-weight:700; font-size:15px}
.searchrow{display:flex; gap:7px; margin:6px 0 10px}
.filters{display:flex; gap:6px; overflow-x:auto; padding-bottom:6px; margin-bottom:4px}
.filters button{white-space:nowrap; background:var(--panel); color:var(--dim);
  padding:6px 12px; border-radius:99px; font-size:12.5px; font-weight:600}
.filters button.on{background:var(--panel2); color:var(--text); border:1px solid var(--accent)}
.empty{color:var(--dim); text-align:center; padding:34px 10px; font-size:14px}

#fab{position:fixed; right:18px; bottom:22px; z-index:35; width:56px; height:56px;
  border-radius:50%; background:var(--accent); color:#fff; font-size:28px; box-shadow:0 6px 18px rgba(0,0,0,.5)}

.modalwrap{position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.6); display:flex; align-items:flex-end; justify-content:center}
.modal{background:var(--bg); border:1px solid var(--line); width:100%; max-width:680px;
  max-height:92vh; overflow-y:auto; border-radius:18px 18px 0 0; padding:16px 16px 30px}
@media(min-width:700px){ .modalwrap{align-items:center} .modal{border-radius:18px; max-height:88vh} }
.mhead{display:flex; align-items:center; gap:10px; margin-bottom:6px}
.mhead h2{font-size:16px; margin:0; flex:1}
.x{background:var(--panel2); color:var(--text); border-radius:10px; padding:6px 12px}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:0 10px}
.subrow{display:grid; grid-template-columns:1fr 92px 1fr 34px 26px; gap:6px; align-items:center; margin-bottom:6px}
.subrow.ref{grid-template-columns:1fr 1.4fr 26px}
.del{color:var(--red); font-size:16px; text-align:center; cursor:pointer; background:none}
details{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:9px 12px; margin:10px 0}
summary{cursor:pointer; font-weight:600; font-size:13.5px}
.hist .card{opacity:.85}
.badge{font-size:10.5px; padding:2px 8px; border-radius:99px; background:var(--panel2); color:var(--dim)}
.badge.rejected{color:var(--red)} .badge.ghosted{color:var(--amber)}
#toast{position:fixed; left:50%; bottom:88px; transform:translateX(-50%); z-index:70;
  background:#252b3b; border:1px solid var(--line); color:var(--text); padding:10px 16px;
  border-radius:12px; font-size:13.5px; display:none; max-width:88vw; box-shadow:0 8px 24px rgba(0,0,0,.5)}
.note{font-size:12.5px; color:var(--dim)}
.filelink{font-size:12.5px}
.onboard{max-width:560px; margin:30px auto; padding:0 18px}
.onboard ol{padding-left:20px} .onboard li{margin:9px 0}
.onboard code{background:var(--panel2); padding:1px 6px; border-radius:6px; font-size:13px}
</style>
</head>
<body>

<header>
  <div class="hrow">
    <h1>&#127919; Internship Tracker</h1>
    <div class="grow"></div>
    <span class="dot" id="sync" title="sync status"></span>
    <button class="iconbtn" id="refreshBtn" title="refresh">&#8635;</button>
    <button class="iconbtn" id="settingsBtn" title="settings">&#9881;&#65039;</button>
  </div>
  <div id="stats"></div>
  <div id="napanel"></div>
  <nav>
    <button data-tab="inbox" class="on">Inbox</button>
    <button data-tab="apps">Applications</button>
    <button data-tab="history">History</button>
  </nav>
</header>

<main>
  <div id="view-inbox"></div>
  <div id="view-apps" style="display:none"></div>
  <div id="view-history" style="display:none"></div>
</main>

<button id="fab" title="add application">+</button>
<div id="modalhost"></div>
<div id="toast"></div>

<script>
"use strict";
/* ================= config ================= */
const OWNER="Flinagus", REPO="job-watcher";
const API=`https://api.github.com/repos/${OWNER}/${REPO}`;
const PLATFORMS=["LinkedIn","Handshake","Indeed","Email","Instagram","TikTok","X","Discord","Other"];
const STATUS_LABEL={planning:"Planning to apply", awaiting:"Awaiting response",
                    in_progress:"In progress", offer:"Offer \u{1F389}"};

/* ================= state ================= */
let token=localStorage.getItem("jt_token")||"";
let state=null, tracker=null, companies=[], resumes=[];
let tab="inbox", appFilter="all", appSearch="";
let saving=false, dirtyAgain=false;

/* ================= tiny utils ================= */
const $=s=>document.querySelector(s);
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const todayISO=()=>new Date().toISOString().slice(0,10);
const uid=()=> "a"+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const b64=s=>btoa(unescape(encodeURIComponent(s)));
function toast(m,ms=2600){const t=$("#toast");t.textContent=m;t.style.display="block";
  clearTimeout(t._h);t._h=setTimeout(()=>t.style.display="none",ms);}
function setSync(c){$("#sync").className="dot "+(c||"");}
function fmtDate(iso){ if(!iso) return ""; try{const [y,m,d]=iso.slice(0,10).split("-");
  return new Date(+y,m-1,+d).toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});}catch{return iso} }

/* ================= GitHub API ================= */
async function gh(path,opts={}){
  const r=await fetch(API+path,{...opts,headers:{
    "Authorization":"Bearer "+token,
    "Accept":opts.raw?"application/vnd.github.raw":"application/vnd.github+json",
    "X-GitHub-Api-Version":"2022-11-28",
    ...(opts.body?{"Content-Type":"application/json"}:{}) , ...(opts.headers||{})}});
  if(r.status===404) return null;
  if(!r.ok) throw new Error(`GitHub ${r.status}: ${(await r.text()).slice(0,180)}`);
  return opts.raw? r.text() : r.json();
}
const readRaw=p=>gh("/contents/"+p,{raw:true});
async function getSha(p){ const m=await gh("/contents/"+encodeURI(p)); return m?m.sha:undefined; }
async function putFile(path,contentB64,message,sha){
  return gh("/contents/"+encodeURI(path),{method:"PUT",
    body:JSON.stringify({message,content:contentB64,...(sha?{sha}:{})})});
}
async function saveTracker(msg="tracker update"){
  if(saving){dirtyAgain=true;return}
  saving=true; setSync("busy");
  try{
    do{ dirtyAgain=false;
      const body=b64(JSON.stringify(tracker,null,2)+"\n");
      let sha=await getSha("tracker.json");
      try{ await putFile("tracker.json",body,msg,sha); }
      catch(e){ if(/409|422/.test(e.message)){ sha=await getSha("tracker.json");
                 await putFile("tracker.json",body,msg,sha);} else throw e; }
    }while(dirtyAgain);
    setSync("ok");
  }catch(e){ setSync("err"); toast("Save failed: "+e.message,5000); }
  finally{ saving=false; }
}

/* ================= data load ================= */
function parseCompanies(yml){
  const out=[]; if(!yml) return out;
  const lines=yml.split(/\r?\n/); let inSimplify=false;
  for(let i=0;i<lines.length;i++){
    const L=lines[i];
    const m=L.match(/^  - name:\s*(.+?)\s*$/);
    if(m){ inSimplify=/^Blocked sites/i.test(m[1]);
           if(!inSimplify) out.push(m[1]); continue; }
    if(inSimplify){ const s=L.match(/^\s{4,}-\s+(.+?)\s*$/); if(s) out.push(s[1]); }
  }
  return out;
}
function defaultTracker(){return {applications:[],history_no_apply:[],history_applied:[],hidden:{},adjust:{}}}
async function loadAll(){
  setSync("busy");
  const [st,tr,cf]=await Promise.all([readRaw("state.json"),readRaw("tracker.json"),readRaw("config.yaml")]);
  state=st?JSON.parse(st):{matched:{},seen:{}};
  tracker=tr?JSON.parse(tr):defaultTracker();
  for(const k of ["applications","history_no_apply","history_applied"]) tracker[k]??=[];
  tracker.hidden??={}; tracker.adjust??={};
  companies=parseCompanies(cf);
  try{ const dir=await gh("/contents/resumes"); resumes=(dir||[]).filter(f=>f.type==="file"); }
  catch{ resumes=[]; }
  setSync("ok");
}

/* ================= derivations ================= */
const activeApps=()=>tracker.applications;
const realCompany=a=>{
  if(a.company && !/^Blocked sites/i.test(a.company)) return a.company;
  const m=(a.title||"").match(/ — ([^—]+)$/); return m?m[1].trim():a.company;
};
function appliedCompanySet(){
  const s=new Set();
  for(const a of [...tracker.applications,...tracker.history_applied])
    if(a.date_applied) s.add(realCompany(a).toLowerCase().trim());
  return s;
}
function companiesNotApplied(){
  const done=appliedCompanySet();
  return companies.filter(c=>!done.has(c.toLowerCase().trim()));
}
function stats(){
  const adj=k=>+(tracker.adjust[k]||0);
  const act=activeApps();
  const sum=(arr,f)=>arr.reduce((n,a)=>n+f(a),0);
  const both=[...act,...tracker.history_applied];
  return [
    {k:"applied",  lbl:"applied",        v:act.filter(a=>a.date_applied).length+tracker.history_applied.length+adj("applied")},
    {k:"rejected", lbl:"rejected",       v:tracker.history_applied.filter(h=>h.outcome==="rejected").length+adj("rejected")},
    {k:"no_resp",  lbl:"no reply yet",   v:act.filter(a=>a.date_applied&&a.status==="awaiting").length+adj("no_resp")},
    {k:"in_prog",  lbl:"in progress",    v:act.filter(a=>a.status==="in_progress").length+adj("in_prog")},
    {k:"not_applied",lbl:"email cos. not applied",v:companiesNotApplied().length,tap:true,noadj:true},
    {k:"referrals",lbl:"referrals",      v:sum(both,a=>(a.referrals||[]).length)+adj("referrals")},
    {k:"interviews",lbl:"interviews",    v:sum(both,a=>+(a.interviews||0))+adj("interviews")},
    {k:"first_rounds",lbl:"1st rounds passed",v:both.filter(a=>a.passed_first_round).length+adj("first_rounds")},
  ];
}

/* ================= rendering ================= */
function render(){ renderStats(); renderInbox(); renderApps(); renderHistory(); }
function renderStats(){
  $("#stats").innerHTML=stats().map(s=>
    `<div class="chip ${s.tap?"tap":""}" data-k="${s.k}">
       ${s.noadj?"":`<span class="adj" data-adj="${s.k}">&#9998;</span>`}
       <b>${s.v}</b><span>${s.lbl}</span></div>`).join("");
  const na=companiesNotApplied();
  $("#napanel").innerHTML=`<b>${na.length} watched compan${na.length===1?"y":"ies"} you haven't applied to:</b><br>`+
    (na.map(c=>`<span class="co">${esc(c)}</span>`).join("")||"<i>none — you've hit them all!</i>");
}
function hiddenHas(c,id){ return (tracker.hidden[c]||[]).map(String).includes(String(id)); }
/* Collapse the same role reposted under many requisition IDs (Cigna alone
   lists one "HIH - Co-Op/Intern" req per opening — 36 of them) into a single
   card: same normalized title + location = one posting. Keeps a stable
   representative (real posted date > richer timeframe > lowest id), matching
   the watcher's email dedupe so both surfaces agree. */
function dedupePostings(items){
  const norm=s=>String(s??"").toLowerCase().replace(/[^a-z0-9]+/g," ").trim();
  const better=(a,b)=>{ // a,b are [id,e]; is a the better representative of the two?
    const ra=[a[1].posted?1:0,(a[1].timeframe||"").length];
    const rb=[b[1].posted?1:0,(b[1].timeframe||"").length];
    if(ra[0]!==rb[0]) return ra[0]>rb[0];
    if(ra[1]!==rb[1]) return ra[1]>rb[1];
    return String(a[0])<String(b[0]);
  };
  const best=new Map();
  for(const pair of items){
    const k=norm(pair[1].title)+"|"+norm(pair[1].location);
    if(!best.has(k)||better(pair,best.get(k))) best.set(k,pair);
  }
  return [...best.values()];
}
function linkedKeys(){
  const s=new Set();
  for(const a of [...tracker.applications,...tracker.history_no_apply,...tracker.history_applied])
    if(a.source) s.add(a.source.company+"␀"+a.source.id);
  return s;
}
function renderInbox(){
  const host=$("#view-inbox");
  const matched=state?.matched||{}, seen=state?.seen||{};
  const linked=linkedKeys();
  const fresh=new Date(Date.now()-2*864e5).toISOString().slice(0,10);
  let total=0, html="";
  for(const co of Object.keys(matched).sort()){
    let items=Object.entries(matched[co])
      .filter(([id])=>!hiddenHas(co,id)&&!linked.has(co+"␀"+id));
    if(!items.length) continue;
    items=dedupePostings(items);   // one card per role, not one per requisition ID
    items.sort((x,y)=>String(y[1].posted||y[1].found||"").localeCompare(String(x[1].posted||x[1].found||"")));
    html+=`<div class="cogroup">${esc(co)}</div>`;
    for(const [id,e] of items){ total++;
      const live=(seen[co]?.[id]||"")>=fresh;
      const posted=e.posted?fmtDate(e.posted):(e.found?"&lt;"+fmtDate(e.found):"");
      html+=`<div class="card">
        <div class="ttl"><span class="live" style="background:${live?"var(--green)":"var(--dim)"}"
             title="${live?"seen on the site in the last 2 days":"not re-seen recently"}"></span>
             <a href="${esc(e.url)}" target="_blank" rel="noopener">${esc(e.title)}</a></div>
        <div class="sub">${esc(e.location||"")}${e.location?" · ":""}${esc(e.timeframe||"timeframe not listed")}${posted?" · Posted: "+posted:""}</div>
        <div class="actions">
          <button class="btn ok sm" data-act="applied" data-c="${esc(co)}" data-id="${esc(id)}">&#10003; Applied</button>
          <button class="btn ghost sm" data-act="save" data-c="${esc(co)}" data-id="${esc(id)}">&#9734; Save</button>
          <button class="btn warn sm" data-act="trash" data-c="${esc(co)}" data-id="${esc(id)}">&#128465;</button>
        </div></div>`;
    }
  }
  host.innerHTML=html||`<div class="empty">Inbox clear &#127881;<br><span class="note">Everything the watcher has matched is either handled or hidden.</span></div>`;
  if(total) host.insertAdjacentHTML("afterbegin",`<div class="note" style="margin:4px 2px 10px">${total} matched posting${total===1?"":"s"} from the email watcher. &#10003; = applied (tracks it), &#9734; = save to tracker for later, &#128465; = not interested — all three also remove it from future emails.</div>`);
}
function appCard(a){
  const rc=realCompany(a);
  return `<div class="card" data-open="${a.id}">
    <div class="row"><div class="ttl" style="flex:1">${esc(rc)} — ${esc(a.title)}</div>
      <span class="pill ${a.status}">${STATUS_LABEL[a.status]||a.status}</span></div>
    <div class="sub">${esc(a.location||"")}${a.location?" · ":""}${esc(a.timeframe||"")}
      ${a.date_applied?" · applied "+fmtDate(a.date_applied):" · not applied yet"}
      ${a.follow_up?` · &#128204; follow-up ${fmtDate(a.follow_up)}`:""}</div>
  </div>`;
}
function renderApps(){
  const host=$("#view-apps");
  let list=[...tracker.applications];
  if(appFilter!=="all") list=list.filter(a=>a.status===appFilter);
  if(appSearch){ const q=appSearch.toLowerCase();
    list=list.filter(a=>(realCompany(a)+" "+a.title).toLowerCase().includes(q)); }
  list.sort((x,y)=>String(y.updated||"").localeCompare(String(x.updated||"")));
  host.innerHTML=`
    <div class="searchrow"><input id="appsearch" placeholder="Search company or title&hellip;" value="${esc(appSearch)}"></div>
    <div class="filters">${["all","planning","awaiting","in_progress","offer"].map(f=>
      `<button data-filter="${f}" class="${appFilter===f?"on":""}">${f==="all"?"All":STATUS_LABEL[f]}</button>`).join("")}</div>
    ${list.map(appCard).join("")||`<div class="empty">No applications here yet.<br><span class="note">Use &#10003; in the Inbox or the + button to add one.</span></div>`}`;
  const si=$("#appsearch");
  si.addEventListener("input",()=>{appSearch=si.value; renderApps(); $("#appsearch").focus();
    const v=$("#appsearch"); v.setSelectionRange(v.value.length,v.value.length);});
}
function renderHistory(){
  const host=$("#view-history");
  const item=(h,i,kind)=>`<div class="card">
      <div class="row"><div class="ttl" style="flex:1">${esc(realCompany(h))} — ${esc(h.title)}</div>
        ${kind==="applied"?`<span class="badge ${h.outcome}">${h.outcome}</span>`:""}</div>
      <div class="sub">${kind==="applied"?`applied ${fmtDate(h.date_applied)} · `:""}removed ${fmtDate(h.removed)}</div>
      <div class="actions">
        <button class="btn ghost sm" data-restore="${kind}:${i}">&#8617; Restore</button>
        <button class="btn warn sm" data-purge="${kind}:${i}">Delete forever</button>
      </div></div>`;
  host.innerHTML=`<div class="hist">
    <h3>Removed without applying (${tracker.history_no_apply.length})</h3>
    ${tracker.history_no_apply.map((h,i)=>item(h,i,"no_apply")).join("")||`<div class="note">empty</div>`}
    <h3>Applied, then closed out — rejected / ghosted (${tracker.history_applied.length})</h3>
    ${tracker.history_applied.map((h,i)=>item(h,i,"applied")).join("")||`<div class="note">empty</div>`}
  </div>`;
}

/* ================= actions ================= */
function hide(c,id){ (tracker.hidden[c]??=[]).push(String(id));
  tracker.hidden[c]=[...new Set(tracker.hidden[c])]; }
function unhide(c,id){ if(tracker.hidden[c]){ tracker.hidden[c]=tracker.hidden[c].filter(x=>String(x)!==String(id));
  if(!tracker.hidden[c].length) delete tracker.hidden[c]; } }
function postingToApp(co,id,e,applied){
  const a=newApp();
  a.source={company:co,id:String(id)};
  a.company=/^Blocked sites/i.test(co)?realCompany({company:co,title:e.title}):co;
  a.title=(e.title||"").replace(/ — [^—]+$/,"");
  a.url=e.url||""; a.location=e.location||""; a.timeframe=e.timeframe||"";
  a.date_posted=(e.posted||"").slice(0,10);
  if(applied){ a.date_applied=todayISO(); a.status="awaiting"; }
  return a;
}
function newApp(){ return {id:uid(),source:null,company:"",company_desc:"",title:"",url:"",
  description:"",timeframe:"",location:"",date_posted:"",date_applied:"",deadline:"",
  follow_up:"",pay:"",resume:"",cover_letter:{sent:false,file:""},recruiters:[],contacts:[],
  referrals:[],status:"planning",interviews:0,passed_first_round:false,notes:"",
  created:todayISO(),updated:todayISO()}; }
function snapshot(a){ const s=JSON.parse(JSON.stringify(a)); s.removed=todayISO(); return s; }

async function inboxAction(act,c,id){
  const e=state?.matched?.[c]?.[id]||{};
  if(act==="trash"){ hide(c,id);
    tracker.history_no_apply.unshift({...snapshot(postingToApp(c,id,e,false)),via:"inbox"});
    toast("Removed — it won't appear in emails again."); }
  else{ const a=postingToApp(c,id,e,act==="applied");
    tracker.applications.unshift(a); hide(c,id);
    toast(act==="applied"?"Marked applied — opening editor to fill in details":"Saved to tracker");
    render(); saveTracker(act+": "+a.title); openEditor(a.id); return; }
  render(); saveTracker(act+" posting");
}

/* ================= editor modal ================= */
function subRows(list,kind){
  const rows=(list||[]).map((r,i)=>kind==="ref"
    ?`<div class="subrow ref" data-kind="ref">
        <input placeholder="Who referred you" value="${esc(r.name)}" data-f="name">
        <input placeholder="note (team, how you know them&hellip;)" value="${esc(r.note||"")}" data-f="note">
        <button class="del" data-delrow>&times;</button></div>`
    :`<div class="subrow" data-kind="${kind}">
        <input placeholder="Name" value="${esc(r.name)}" data-f="name">
        <input placeholder="Platform" list="platforms" value="${esc(r.platform||"")}" data-f="platform">
        <input placeholder="Profile link" value="${esc(r.url||"")}" data-f="url">
        <input type="checkbox" ${r.reached_out?"checked":""} data-f="reached_out" title="reached out?">
        <button class="del" data-delrow>&times;</button></div>`).join("");
  return rows;
}
function readSubRows(container,kind){
  return [...container.querySelectorAll(`.subrow[data-kind=${kind}]`)].map(row=>{
    const g=f=>row.querySelector(`[data-f=${f}]`);
    return kind==="ref"?{name:g("name").value.trim(),note:g("note").value.trim()}
      :{name:g("name").value.trim(),platform:g("platform").value.trim(),
        url:g("url").value.trim(),reached_out:g("reached_out").checked};
  }).filter(r=>r.name||r.url||r.note);
}
function resumeOptions(sel){
  return `<option value="">— none —</option>`+resumes.map(f=>
    `<option ${f.name===sel?"selected":""}>${esc(f.name)}</option>`).join("");
}
function openEditor(appId){
  const isNew=!appId;
  const a=isNew?newApp():tracker.applications.find(x=>x.id===appId);
  if(!a) return;
  const applied=!!a.date_applied;
  const host=$("#modalhost");
  host.innerHTML=`<div class="modalwrap"><div class="modal" id="ed">
    <div class="mhead"><h2>${isNew?"Add application":"Edit application"}</h2>
      <button class="x" data-close>&times;</button></div>
    <datalist id="platforms">${PLATFORMS.map(p=>`<option>${p}</option>`).join("")}</datalist>
    <div class="grid2">
      <div><label>Company name</label><input id="f_company" value="${esc(a.company)}"></div>
      <div><label>Posting title</label><input id="f_title" value="${esc(a.title)}"></div>
    </div>
    <label>Brief company description</label><input id="f_company_desc" value="${esc(a.company_desc)}" placeholder="what they do, size, why interesting">
    <label>Posting URL</label><input id="f_url" value="${esc(a.url)}" placeholder="https://&hellip;">
    <details ${a.description?"open":""}><summary>Job description</summary>
      <textarea id="f_description" placeholder="paste the description here">${esc(a.description)}</textarea></details>
    <div class="grid2">
      <div><label>Time period</label><input id="f_timeframe" value="${esc(a.timeframe)}" placeholder="Summer 2027"></div>
      <div><label>Location</label><input id="f_location" value="${esc(a.location)}"></div>
      <div><label>Date posted</label><input id="f_date_posted" type="date" value="${esc(a.date_posted)}"></div>
      <div><label>Date applied</label><input id="f_date_applied" type="date" value="${esc(a.date_applied)}"></div>
      <div><label>Application deadline</label><input id="f_deadline" type="date" value="${esc(a.deadline)}"></div>
      <div><label>Follow-up reminder</label><input id="f_follow_up" type="date" value="${esc(a.follow_up)}"></div>
      <div><label>Pay (if listed)</label><input id="f_pay" value="${esc(a.pay)}" placeholder="$25/hr"></div>
      <div><label>Status</label><select id="f_status">
        ${Object.entries(STATUS_LABEL).map(([k,v])=>`<option value="${k}" ${a.status===k?"selected":""}>${v}</option>`).join("")}
      </select></div>
    </div>
    <div class="grid2">
      <div><label>Resume used</label><select id="f_resume">${resumeOptions(a.resume)}</select>
        <div class="note" style="margin-top:4px"><a href="#" data-upresume>&#8613; upload a new resume</a></div></div>
      <div><label>Cover letter</label>
        <div class="row" style="margin-top:6px"><input type="checkbox" id="f_cl_sent" ${a.cover_letter?.sent?"checked":""}> <span>sent one</span></div>
        <div class="note" style="margin-top:6px">
          ${a.cover_letter?.file?`<a href="#" data-viewfile="${esc(a.cover_letter.file)}" class="filelink">&#128196; ${esc(a.cover_letter.file.split("/").pop())}</a> · `:""}
          <a href="#" data-upcl>&#8613; ${a.cover_letter?.file?"replace":"attach"} file</a></div></div>
    </div>
    <div class="grid2">
      <div><label>Interview rounds done</label><input id="f_interviews" type="number" min="0" value="${a.interviews||0}"></div>
      <div><label style="margin-bottom:8px">First round passed?</label>
        <div class="row"><input type="checkbox" id="f_first" ${a.passed_first_round?"checked":""}> <span>yes &#127881;</span></div></div>
    </div>
    <label>Recruiter(s)</label><div id="rows_rec">${subRows(a.recruiters,"rec")}</div>
    <button class="btn ghost sm" data-addrow="rec">+ add recruiter</button>
    <label>People to network with <span style="text-transform:none">(checkbox = reached out)</span></label>
    <div id="rows_net">${subRows(a.contacts,"net")}</div>
    <button class="btn ghost sm" data-addrow="net">+ add person</button>
    <label>Referral(s)</label><div id="rows_ref">${subRows(a.referrals,"ref")}</div>

    <details ${a.notes?"open":""}><summary>Notes</summary>

    <div class="actions" style="margin-top:14px">
      <button class="btn pri" data-save>Save</button>
      ${isNew?"":applied
        ?`<button class="btn warn" data-outcome="rejected">Rejected &#128546;</button>
          <button class="btn warn" data-outcome="ghosted">Ghosted &#128123;</button>`

    if(t.dataset.addrow){ ev.preventDefault();

    if(t.dataset.delrow!==undefined){ t.closest(".subrow").remove(); return; }
    if(t.dataset.upresume!==undefined){ ev.preventDefault(); await uploadResume(()=>{

      await uploadFile(`files/cl-${a.id}`,f=>{a.cover_letter={sent:true,file:f};
        toast("Cover letter attached — hit Save");}); return; }
    if(t.dataset.viewfile){ ev.preventDefault(); viewFile(t.dataset.viewfile); return; }
    if(t.dataset.save!==undefined){ collect();
      if(!a.company&&!a.title){ toast("Give it at least a company or title"); return; }
      if(isNew) tracker.applications.unshift(a);
      host.innerHTML=""; render(); saveTracker("edit: "+(a.title||a.company)); return; }
    if(t.dataset.outcome){ collect(); const out=t.dataset.outcome;
      tracker.applications=tracker.applications.filter(x=>x.id!==a.id);
      tracker.history_applied.unshift({...snapshot(a),outcome:out});
      host.innerHTML=""; render(); saveTracker(out+": "+a.title);

      tracker.history_no_apply.unshift(snapshot(a));
      host.innerHTML=""; render(); saveTracker("removed (no apply): "+a.title); return; }
  });
}

/* ================= files ================= */
function pickFile(accept){ return new Promise(res=>{
  const i=document.createElement("input"); i.type="file"; if(accept) i.accept=accept;
  i.onchange=()=>res(i.files[0]||null); i.click(); }); }
function fileToB64(f){ return new Promise((res,rej)=>{ const r=new FileReader();
  r.onload=()=>res(String(r.result).split(",")[1]); r.onerror=rej; r.readAsDataURL(f); }); }
async function uploadResume(after){
  const f=await pickFile(".pdf,.doc,.docx"); if(!f) return;
  const name=f.name.replace(/[^\w. -]+/g,"_");
  setSync("busy");
  try{ await putFile("resumes/"+name,await fileToB64(f),"resume: "+name,await getSha("resumes/"+name));
    const dir=await gh("/contents/resumes"); resumes=(dir||[]).filter(x=>x.type==="file");
    toast("Uploaded "+name); setSync("ok"); after&&after();
  }catch(e){ setSync("err"); toast("Upload failed: "+e.message,5000); }
}
async function uploadFile(prefix,after){
  const f=await pickFile(); if(!f) return;
  const path=`${prefix}-${f.name.replace(/[^\w. -]+/g,"_")}`;
  setSync("busy");
  try{ await putFile(path,await fileToB64(f),"file: "+path,await getSha(path));
    setSync("ok"); after&&after(path);
  }catch(e){ setSync("err"); toast("Upload failed: "+e.message,5000); }
}
async function viewFile(path){
  try{ toast("Fetching…",1200);
    const r=await fetch(API+"/contents/"+encodeURI(path),{headers:{
      Authorization:"Bearer "+token,Accept:"application/vnd.github.raw"}});
    if(!r.ok) throw new Error(r.status);
    const blob=await r.blob(); const url=URL.createObjectURL(blob);
    const aEl=document.createElement("a"); aEl.href=url; aEl.download=path.split("/").pop();
    aEl.click(); setTimeout(()=>URL.revokeObjectURL(url),60000);
  }catch(e){ toast("Couldn't fetch file: "+e.message); }
}

/* ================= settings ================= */
function openSettings(){
  const host=$("#modalhost");
  host.innerHTML=`<div class="modalwrap"><div class="modal">
    <div class="mhead"><h2>Settings</h2><button class="x" data-close>&times;</button></div>
    <label>GitHub token (fine-grained, this device only)</label>
    <input id="s_token" type="password" value="${esc(token)}" placeholder="github_pat_&hellip;">
    <div class="actions"><button class="btn pri" data-savetoken>Save & test</button></div>
    <h3>Resumes on file</h3>
    <div id="s_resumes">${resumes.map(f=>`<div class="row" style="margin-bottom:7px">
        <a href="#" data-viewfile="resumes/${esc(f.name)}" class="filelink" style="flex:1">&#128196; ${esc(f.name)}</a>
        <button class="btn warn sm" data-delresume="${esc(f.name)}">delete</button></div>`).join("")||`<div class="note">none uploaded yet</div>`}</div>
    <div class="actions"><button class="btn ghost sm" data-upresume>&#8613; upload resume</button></div>
    <h3>Data</h3>
    <div class="actions">
      <button class="btn ghost sm" data-export>&#11015; download backup</button>
      <a class="btn ghost sm" href="https://github.com/${OWNER}/${REPO}" target="_blank" style="display:inline-block">open data repo</a>
    </div>
    <div class="note" style="margin-top:12px">Your data lives in <b>your private</b> ${OWNER}/${REPO} repo
      (tracker.json + resumes/). The token is stored only in this browser.</div>
  </div></div>`;
  host.firstElementChild.addEventListener("click",async ev=>{
    const t=ev.target;
    if(t.dataset.close!==undefined||t.classList.contains("modalwrap")){ host.innerHTML=""; return; }
    if(t.dataset.savetoken!==undefined){
      token=$("#s_token").value.trim(); localStorage.setItem("jt_token",token);
      try{ await gh(""); toast("Token works ✅"); host.innerHTML=""; boot(); }
      catch(e){ toast("Token failed: "+e.message,5000); } return; }
    if(t.dataset.upresume!==undefined){ await uploadResume(openSettings); return; }
    if(t.dataset.delresume){ if(!confirm("Delete "+t.dataset.delresume+"?")) return;
      const p="resumes/"+t.dataset.delresume;
      await gh("/contents/"+encodeURI(p),{method:"DELETE",
        body:JSON.stringify({message:"delete "+p,sha:await getSha(p)})});
      resumes=resumes.filter(f=>f.name!==t.dataset.delresume); openSettings(); return; }
    if(t.dataset.viewfile){ ev.preventDefault(); viewFile(t.dataset.viewfile); return; }
    if(t.dataset.export!==undefined){
      const blob=new Blob([JSON.stringify(tracker,null,2)],{type:"application/json"});
      const u=URL.createObjectURL(blob); const aEl=document.createElement("a");
      aEl.href=u; aEl.download="tracker-backup-"+todayISO()+".json"; aEl.click(); return; }
  });
}

/* ================= deep links from the email ================= */
async function handleDeepLink(){
  const q=new URLSearchParams(location.search);
  const act=q.get("act"); if(!act) return;
  history.replaceState(null,"",location.pathname);
  const c=q.get("c")||"", id=q.get("id")||"";
  if(!c||!id) return;
  const e=state?.matched?.[c]?.[id]||{title:q.get("t")||"",url:q.get("u")||"",
    location:q.get("l")||"",timeframe:q.get("tf")||"",posted:q.get("p")||""};
  if(hiddenHas(c,id)){ toast("Already handled that one ✅"); return; }
  if(act==="readd"){   // a posting the watcher's deep check removed — put it back
    const a=postingToApp(c,id,e,false);   // into the pipeline as "planning"
    tracker.applications.unshift(a); hide(c,id);
    render(); toast("Re-added to your applications ✅");
    saveTracker("re-add: "+(a.title||a.company));
    return;
  }
  await inboxAction(act==="applied"?"applied":"trash",c,id);
}

/* ================= events + boot ================= */
document.addEventListener("click",ev=>{
  const t=ev.target;
  const tabBtn=t.closest("nav button");
  if(tabBtn){ tab=tabBtn.dataset.tab;
    document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("on",b===tabBtn));
    for(const v of ["inbox","apps","history"]) $("#view-"+v).style.display=v===tab?"":"none";
    return; }
  if(t.id==="fab"){ openEditor(null); return; }
  if(t.id==="settingsBtn"){ openSettings(); return; }
  if(t.id==="refreshBtn"){ boot(); return; }
  const chip=t.closest(".chip.tap");
  if(chip){ const p=$("#napanel"); p.style.display=p.style.display==="block"?"none":"block"; return; }
  if(t.dataset.adj){ ev.stopPropagation();
    const k=t.dataset.adj, cur=tracker.adjust[k]||0;
    const v=prompt("Manual adjustment for this number (adds to the auto-count). Current: "+cur,cur);
    if(v===null) return; tracker.adjust[k]=+v||0; render(); saveTracker("adjust "+k); return; }
  if(t.dataset.act&&t.dataset.c){ inboxAction(t.dataset.act,t.dataset.c,t.dataset.id); return; }
  const card=t.closest("[data-open]");
  if(card&&!t.closest("a")){ openEditor(card.dataset.open); return; }
  if(t.dataset.filter){ appFilter=t.dataset.filter; renderApps(); return; }
  if(t.dataset.restore){ const [kind,i]=t.dataset.restore.split(":");
    const list=kind==="applied"?tracker.history_applied:tracker.history_no_apply;
    const h=list.splice(+i,1)[0]; const viaInbox=h.via==="inbox";
    delete h.removed; delete h.outcome; delete h.via;
    if(kind==="applied"){ h.status=h.status==="offer"?"offer":"awaiting"; tracker.applications.unshift(h); }
    else if(viaInbox&&h.source){ unhide(h.source.company,h.source.id); } // back to inbox
    else{ if(h.source) unhide(h.source.company,h.source.id);
          h.status="planning"; tracker.applications.unshift(h); }
    render(); saveTracker("restore: "+h.title); toast("Restored"); return; }
  if(t.dataset.purge){ if(!confirm("Delete forever?")) return;
    const [kind,i]=t.dataset.purge.split(":");
    (kind==="applied"?tracker.history_applied:tracker.history_no_apply).splice(+i,1);
    render(); saveTracker("purge history entry"); return; }
});

async function boot(){
  if(!token){ renderOnboarding(); return; }
  try{ await loadAll(); }
  catch(e){ setSync("err");
    if(/401|403/.test(e.message)){ toast("Token expired or invalid — paste a fresh one",5000); renderOnboarding(); return; }
    toast("Load failed: "+e.message,6000); return; }
  render();
  await handleDeepLink();
}
boot();
</script>
